        '482':
          description: ThrottlingException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ThrottlingException'
        '483':
          description: AccessDeniedException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccessDeniedException'
      parameters:
      - name: analyzerName
        in: path
        required: true
        description: The name of the analyzer to retrieve rules from.
        schema:
          type: string
          pattern: '[A-Za-z][A-Za-z0-9_.-]*'
          minLength: 1
          maxLength: 255
      - name: nextToken
        in: query
        required: false
        description: A token used for pagination of results returned.
        schema:
          type: string
      - name: maxResults
        in: query
        required: false
        description: The maximum number of results to return in the request.
        schema:
          type: integer
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
      summary: Amazon IAM Access Analyzer List Archive Rules
      tags:

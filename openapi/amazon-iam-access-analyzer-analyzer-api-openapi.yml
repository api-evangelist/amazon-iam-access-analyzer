        '485':
          description: ThrottlingException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ThrottlingException'
        '486':
          description: AccessDeniedException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccessDeniedException'
      parameters:
      - name: analyzerName
        in: path
        required: true
        description: The name of the created analyzer.
        schema:
          type: string
          pattern: '[A-Za-z][A-Za-z0-9_.-]*'
          minLength: 1
          maxLength: 255
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - ruleName
              - filter
              properties:
                ruleName:
                  description: The name of the rule to create.
                  type: string

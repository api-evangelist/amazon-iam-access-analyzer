                  type: object
                  additionalProperties:
                    $ref: '#/components/schemas/Criterion'
                clientToken:
                  description: A client token.
                  type: string
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
      summary: Amazon IAM Access Analyzer Create Archive Rule

aid: amazon-iam-access-analyzer
name: Amazon IAM Access Analyzer
description: >-
  AWS IAM Access Analyzer helps you set, verify, and refine your IAM policies
  by providing a suite of capabilities including findings for external, internal,
  and unused access, basic and custom policy checks for validating policies, and
  policy generation to generate fine-grained policies. It uses automated reasoning
  to identify resources shared with external entities and helps implement least
  privilege access across your AWS environment.

aid: amazon-iam-access-analyzer
name: Amazon IAM Access Analyzer
description: >-
  AWS IAM Access Analyzer helps you identify the resources in your organization
  and accounts, such as Amazon S3 buckets or IAM roles, shared with an external
  entity. This lets you identify unintended access to your resources and data,
  which is a security risk.
